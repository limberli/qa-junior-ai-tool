version: '3.8'

# Default mode: local Ollama (phi3:mini).
# For Groq cloud API (fast, free tier): use docker-compose-groq.yml instead.
#   export GROQ_API_KEY=gsk_...
#   docker compose -f docker-compose-groq.yml up --build -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-model-init:
    image: curlimages/curl:latest
    platform: linux/amd64
    depends_on:
      - ollama
    entrypoint: >
      sh -c "curl -sf -X POST http://ollama:11434/api/pull
        -d '{\"name\":\"phi3:mini\",\"stream\":false}'
        --max-time 600"
    restart: "no"

  tester-agent:
    platform: linux/amd64
    build:
      context: .
      dockerfile: tester-agent/Dockerfile
    container_name: tester-agent
    ports:
      - "8081:8081"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: phi3:mini
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - ollama-model-init

  analyst-agent:
    platform: linux/amd64
    build:
      context: .
      dockerfile: analyst-agent/Dockerfile
    container_name: analyst-agent
    ports:
      - "8082:8082"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: phi3:mini
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - ollama-model-init

  host-orchestrator:
    platform: linux/amd64
    build:
      context: .
      dockerfile: host-orchestrator/Dockerfile
    container_name: host-orchestrator
    ports:
      - "8080:8080"
    environment:
      AGENTS_TESTER_URL: http://tester-agent:8081
      AGENTS_ANALYST_URL: http://analyst-agent:8082
      AGENT_PUBLIC_URL: http://host-orchestrator:8080
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - orchestrator_data:/app/data
    depends_on:
      - tester-agent
      - analyst-agent

  a2a-ui:
    image: node:22-alpine
    container_name: a2a-ui
    working_dir: /app
    volumes:
      - ./a2a-ui:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npm start"
    environment:
      # UI loads this list of agent-card URLs on startup and auto-connects the orchestrator.
      NEXT_PUBLIC_DEFAULT_AGENT_CARDS_URL: http://host-orchestrator:8080/agent-cards.json
    depends_on:
      - host-orchestrator

volumes:
  ollama_data:
  orchestrator_data:
